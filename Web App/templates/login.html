<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("/static/background.jpg");
            background-size: cover;
            background-position: center bottom;
        }
        .login-card {
            background: rgba(15,17,21,0.85);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            box-shadow: rgba(0,0,0,0.6) 0 20px 50px;
            width: 100%;
            max-width: 380px;
            padding: 2.5rem;
        }
    </style>
</head>
<body>
<div class="login-card text-white">
    <div class="text-center mb-4">
        <i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-primary"></i>
        <h4 class="mb-0">Inventory</h4>
        <p class="text-secondary small mt-1">CT Group - Internal Tool</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
        <i class="fa-solid fa-circle-xmark me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
            <label class="form-label small text-secondary">Username</label>
            <input class="form-control" name="username" autocomplete="username"
                   value="{{ username or '' }}" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label small text-secondary">Password</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100">
            <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
